# ===== PRODUCTION SETTINGS =====
server.port=${PORT:8080}

# ===== DATABASE =====
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=moviedb

# ===== GOOGLE AUTH =====
google.client.id=${GOOGLE_CLIENT_ID}

# ===== DIALOGFLOW =====
dialogflow.project-id=${DIALOGFLOW_PROJECT_ID}
dialogflow.language-code=en

# ===== TMDB API =====
tmdb.api.key=${TMDB_API_KEY}
tmdb.api.url=https://api.themoviedb.org/3

# ===== CASHFREE PAYMENT (TEST MODE) =====
cashfree.app.id=${CASFREE_APP_ID}
cashfree.secret.key=${CASFREE_SECRET_KEY}
cashfree.base.url=https://sandbox.cashfree.com/pg
cashfree.test.mode=true

# IMPORTANT: Update these to your Render URLs after deployment
cashfree.payment.url=https://your-backend-url.onrender.com/payment/webhook
cashfree.return.url=https://your-frontend-url.onrender.com/payment/return

# ===== MOVIEGLU =====
movieglu.api.key=${MOVIEGLU_API_KEY}
movieglu.api.url=https://api-gate2.movieglu.com
movieglu.client=${MOVIEGLU_CLIENT}
movieglu.authorization=${MOVIEGLU_AUTHORIZATION}
movieglu.territory=IN
movieglu.api.version=v201

# ===== OMDB API =====
omdb.api.key=${OMDB_API_KEY}
omdb.api.url=http://www.omdbapi.com

# ===== EMAIL CONFIGURATION =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== APP CONFIGURATION =====
spring.application.name=Chatbot
app.base-url=https://your-backend-url.onrender.com

# ===== THYMELEAF (For email templates) =====
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ===== LOGGING (Reduce in production) =====
logging.level.root=WARN
logging.level.com.ticket.chatbot=INFO
logging.level.org.springframework.web=WARN

# ===== SECURITY & PERFORMANCE =====
# Keep connection timeout for Render
server.tomcat.keep-alive-timeout=60000
server.connection-timeout=60000

# ===== CORS CONFIGURATION =====
# Note: CORS is configured in Java code (CorsConfig.java)